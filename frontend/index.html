    <head>
        <meta charset="UTF-8" />
        <!-- 隐藏 Referer 信息避免被跟踪 -->
        <!-- <meta name="referrer" content="no-referrer"> -->
        <link
            rel="icon"
            href="images/icon.webp"
            type="image/x-icon"
        />
        <!-- 自定义网页的logo -->

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
        />
        <!-- 多设备自适应 -->

        <!-- Font Awesome (使用 BootCDN 加速国内访问) -->
        <link
            rel="stylesheet"
            href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />

        <!-- 关键资源预加载：减少首屏渲染等待 -->
        <link rel="preconnect" href="https://cdn.bootcdn.net" crossorigin />

        <title>NEGIAO's WebGIS</title>
    </head>

    <body>
        <div id="app"></div>
        <script
            type="module"
            src="./src/main.js"
        ></script>
        <!-- 导入js文件 -->

        <script defer src="./min-enhanced.js"></script>
        <!--
        导入增强功能的js文件（51.la立即执行，其他延迟3秒 ）
        defer：不阻塞 HTML 解析，DOMContentLoaded 前按顺序执行
     -->
    </body>
</html>
