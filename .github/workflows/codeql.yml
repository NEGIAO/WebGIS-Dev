name: "CodeQL 安全扫描"

on:
  push:
    branches: [ "main" ]
    # 仅分析 src 和 backend 中的实际代码变更，跳过文档/CI 变更
    paths:
      - 'frontend/src/**'
      - 'backend/**'
      - '!backend/Docs/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/src/**'
      - 'backend/**'
      - '!backend/Docs/**'
  schedule:
    - cron: '31 9 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: 分析 ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
    - name: 检出仓库
      uses: actions/checkout@v4

    - name: 初始化 CodeQL (启用 security-and-quality 查询集)
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-and-quality

    - name: 执行 CodeQL 分析
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
