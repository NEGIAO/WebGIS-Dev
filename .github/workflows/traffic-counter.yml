name: Update Traffic Stats

on:
  schedule:
    # 建议避开 UTC 0 点的高峰期，改为 UTC 2 点（北京时间上午 10 点）执行
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save traffic data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRAFFIC_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '.github/traffic.json';

            // ========================
            // 1. 默认数据结构
            // ========================
            let data = {
              totalViews: 0,
              totalUniqueViews: 0,
              totalClones: 0,
              totalUniqueClones: 0,
              lastUpdate: '',
              lastCountedDate: '',
              daily: {}
            };

            // ========================
            // 2. 读取旧数据（兼容旧版本）
            // ========================
            if (fs.existsSync(path)) {
              const content = fs.readFileSync(path, 'utf8');
              if (content) {
                try {
                  const oldData = JSON.parse(content);
                  data = { ...data, ...oldData };
                } catch (e) {
                  console.log('JSON parse error, using default data');
                }
              }
            }

            // 字段兜底（防止 undefined 报错）
            data.totalViews = data.totalViews || 0;
            data.totalUniqueViews = data.totalUniqueViews || 0;
            data.totalClones = data.totalClones || 0;
            data.totalUniqueClones = data.totalUniqueClones || 0;
            data.lastUpdate = data.lastUpdate || '';
            data.lastCountedDate = data.lastCountedDate || '';
            if (!data.daily) data.daily = {};

            // ========================
            // 3. 获取 GitHub API 数据
            // ========================
            const views = await github.request('GET /repos/{owner}/{repo}/traffic/views', {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const clones = await github.request('GET /repos/{owner}/{repo}/traffic/clones', {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // ========================
            // 4. 获取“前天”的日期 (T-2)，因为昨天的数据可能有延迟
            // ========================
            const targetDate = new Date();
            targetDate.setUTCDate(targetDate.getUTCDate() - 2); 
            const targetDateStr = targetDate.toISOString().split('T')[0];

            const targetViewsObj = views.data.views.find(v => v.timestamp.startsWith(targetDateStr));
            const targetClonesObj = clones.data.clones.find(c => c.timestamp.startsWith(targetDateStr));

            const tViews = targetViewsObj ? targetViewsObj.count : 0;
            const tUViews = targetViewsObj ? targetViewsObj.uniques : 0;
            const tClones = targetClonesObj ? targetClonesObj.count : 0;
            const tUClones = targetClonesObj ? targetClonesObj.uniques : 0;

            console.log(`Target Date (T-2): ${targetDateStr}`);
            console.log(`Views: ${tViews}, Clones: ${tClones}`);

            // ========================
            // 5. 初始化（仅第一次）
            // ========================
            const isFirstRun = !data.lastUpdate;
            if (isFirstRun) {
              console.log('First run detected. Initializing data from past 14 days.');
              data.totalViews = views.data.count;
              data.totalUniqueViews = views.data.uniques;
              data.totalClones = clones.data.count;
              data.totalUniqueClones = clones.data.uniques;
            }

            // ========================
            // 6. 防重复统计与累加（核心）
            // ========================
            if (data.lastCountedDate !== targetDateStr) {
              // 只有在非初次运行的情况下，才进行累加，防止第一次运行把今天的数据重复加上
              if (!isFirstRun) {
                data.totalViews += tViews;
                data.totalUniqueViews += tUViews;
                data.totalClones += tClones;
                data.totalUniqueClones += tUClones;
              }

              data.lastCountedDate = targetDateStr;

              // 记录每日详情
              data.daily[targetDateStr] = {
                views: tViews,
                uniqueViews: tUViews,
                clones: tClones,
                uniqueClones: tUClones
              };
            } else {
              console.log(`Data for ${targetDateStr} already counted. Skipping addition.`);
            }

            data.lastUpdate = new Date().toISOString();

            // ========================
            // 7. 写入文件
            // ========================
            const dir = '.github';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir);

            fs.writeFileSync(path, JSON.stringify(data, null, 2));

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/traffic.json'
          message: "chore: update traffic statistics [auto]"
          default_author: github_actions
