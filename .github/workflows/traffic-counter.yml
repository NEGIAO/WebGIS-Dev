name: Update Traffic Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save traffic data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRAFFIC_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '.github/traffic.json';

            // ========================
            // 1. 初始化数据结构
            // ========================
            let data = {
              totalViews: 0,
              totalUniqueViews: 0,
              totalClones: 0,
              totalUniqueClones: 0,
              lastUpdate: '',
              lastCountedDate: '',
              daily: {}
            };

            if (fs.existsSync(path)) {
              const content = fs.readFileSync(path, 'utf8');
              if (content) data = JSON.parse(content);
            }

            // ========================
            // 2. 获取 GitHub API 数据
            // ========================
            const views = await github.request('GET /repos/{owner}/{repo}/traffic/views', {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const clones = await github.request('GET /repos/{owner}/{repo}/traffic/clones', {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // ========================
            // 3. 获取“昨天”的日期
            // ========================
            const yesterday = new Date();
            yesterday.setUTCDate(yesterday.getUTCDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];

            const yesterdayViewsObj = views.data.views.find(v => v.timestamp.startsWith(yesterdayStr));
            const yesterdayClonesObj = clones.data.clones.find(c => c.timestamp.startsWith(yesterdayStr));

            const yViews = yesterdayViewsObj ? yesterdayViewsObj.count : 0;
            const yUViews = yesterdayViewsObj ? yesterdayViewsObj.uniques : 0;
            const yClones = yesterdayClonesObj ? yesterdayClonesObj.count : 0;
            const yUClones = yesterdayClonesObj ? yesterdayClonesObj.uniques : 0;

            // ========================
            // 4. 初始化（仅第一次）
            // ========================
            if (!data.lastUpdate) {
              data.totalViews = views.data.count;
              data.totalUniqueViews = views.data.uniques;
              data.totalClones = clones.data.count;
              data.totalUniqueClones = clones.data.uniques;
            }

            // ========================
            // 5. 防重复统计（关键）
            // ========================
            if (data.lastCountedDate !== yesterdayStr) {
              data.totalViews += yViews;
              data.totalUniqueViews += yUViews;
              data.totalClones += yClones;
              data.totalUniqueClones += yUClones;

              data.lastCountedDate = yesterdayStr;

              // 保存每日记录
              data.daily[yesterdayStr] = {
                views: yViews,
                uniqueViews: yUViews,
                clones: yClones,
                uniqueClones: yUClones
              };
            }

            data.lastUpdate = new Date().toISOString();

            // ========================
            // 6. 写入文件
            // ========================
            const dir = '.github';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir);

            fs.writeFileSync(path, JSON.stringify(data, null, 2));
      
      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/traffic.json'
          message: "Update traffic statistics [auto]"
          default_author: github_actions
