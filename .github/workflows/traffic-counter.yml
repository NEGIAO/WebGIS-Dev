name: Update Traffic Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch traffic data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '.github/traffic.json';

            let totalViews = 0;
            let totalClones = 0;

            if (fs.existsSync(path)) {
              const data = JSON.parse(fs.readFileSync(path, 'utf8'));
              totalViews = data.count.views || 0;
              totalClones = data.count.clones || 0;
            }

            const { data: views } = await github.rest.repos.getPageViews({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const { data: clones } = await github.rest.repos.getClones({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const newViews = views.count || 0;
            const newClones = clones.count || 0;

            const stats = {
              count: {
                views: totalViews + newViews,
                clones: totalClones + newClones,
              },
              lastUpdate: new Date().toISOString(),
            };

            fs.writeFileSync(path, JSON.stringify(stats, null, 2));

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update traffic stats [auto]"
          committer_name: GitHub Actions
          committer_email: actions@github.com