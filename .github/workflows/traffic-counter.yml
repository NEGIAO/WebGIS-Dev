name: Update Traffic Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save traffic data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRAFFIC_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '.github/traffic.json';

            // 读取你现有的总数（不清空！不覆盖！）
            let data = {
              totalViews: 0,
              totalClones: 0,
              lastUpdate: ''
            };
            if (fs.existsSync(path)) {
              data = JSON.parse(fs.readFileSync(path, 'utf8'));
            }

            // 获取 GitHub 官方 14天数据
            const views = await github.request('GET /repos/{owner}/{repo}/traffic/views', {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const clones = await github.request('GET /repos/{owner}/{repo}/traffic/clones', {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // ==============================================
            // 逻辑：如果是第一次统计 → 直接用 GitHub 14天总数
            // 之后每天 → 只加【今天新增】，不重复计算
            // ==============================================
            const today = new Date().toISOString().split('T')[0];
            const todayViews = views.data.views.find(v => v.timestamp.startsWith(today))?.count || 0;
            const todayClones = clones.data.clones.find(c => c.timestamp.startsWith(today))?.count || 0;

            if (data.totalViews === 0 && data.totalClones === 0) {
              // 第一次运行：用 GitHub 官方近14天真实总数
              data.totalViews = views.data.count;
              data.totalClones = clones.data.count;
            } else {
              // 非第一次：只加今天新增
              data.totalViews += todayViews;
              data.totalClones += todayClones;
            }

            data.lastUpdate = new Date().toISOString();
            fs.writeFileSync(path, JSON.stringify(data, null, 2));

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update traffic statistics [auto]"
          committer_name: GitHub Actions
          committer_email: actions@github.com